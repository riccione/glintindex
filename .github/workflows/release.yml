---
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: false

env:
  CARGO_TERM_COLOR: always
  TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag || 'v0.0.0-test' }}
  # Cargo Workspace Configurations
  CLI_PKG: glintindex-cli
  GUI_PKG: glintindex-gui
  CLI_BIN: glintindex-cli
  GUI_BIN: glintindex-gui
  MAC_APP_NAME: GlintIndex

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set Version
        shell: bash
        run: echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build CLI binary (No GTK required)
        run: cargo build --release -p ${{ env.CLI_PKG }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-4-dev build-essential

      - name: Build GUI binary
        run: cargo build --release -p ${{ env.GUI_PKG }}

      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build .deb packages
        run: |
          cargo deb -p ${{ env.CLI_PKG }} || true
          cargo deb -p ${{ env.GUI_PKG }}

      - name: Locate and Rename .deb
        run: |
          mkdir -p staging
          # Find and copy without switching directories to keep paths clean
          find target -name "*.deb" -exec cp {} staging/ \;
          for f in staging/*.deb; do
            [ -e "$f" ] || continue
            mv "$f" "${f%.deb}_${{ env.VERSION }}_amd64.deb"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: staging/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set Version
        shell: bash
        run: echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-tools
            mingw-w64-x86_64-ntldd
            p7zip

      - name: Show toolchain
        shell: msys2 {0}
        run: |
          which rustc
          which cargo
          rustc --version
          cargo --version
          gcc --version
          pkg-config --version

      - name: Build workspace
        shell: msys2 {0}
        env:
          PKG_CONFIG_PATH: /mingw64/lib/pkgconfig
        run: |
          set -euxo pipefail
          cargo build --release -p ${{ env.CLI_PKG }}
          cargo build --release -p ${{ env.GUI_PKG }}

      - name: Create distribution
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          
          mkdir -p dist
          cp target/release/${{ env.CLI_BIN }}.exe dist/
          cp target/release/${{ env.GUI_BIN }}.exe dist/

          [ -f LICENSE ] && cp LICENSE dist/
          [ -f README.md ] && cp README.md dist/

          echo "Collecting runtime DLLs for both apps..."
          # Run ntldd. Convert all backslashes to forward slashes.
          # Filter and extract paths safely using awk to avoid grep pipefail crashes.
          ntldd -R "dist/${{ env.CLI_BIN }}.exe" | sed 's/\\/\//g' | awk 'tolower($0) ~ /mingw64\/bin/ {print $3}' > paths.txt
          ntldd -R "dist/${{ env.GUI_BIN }}.exe" | sed 's/\\/\//g' | awk 'tolower($0) ~ /mingw64\/bin/ {print $3}' >> paths.txt

          sort -u paths.txt | xargs -I {} cp "{}" dist/
          rm paths.txt

          echo "Final contents:"
          ls -lh dist

      - name: Create ZIP
        shell: msys2 {0}
        run: |
          set -euxo pipefail

          cd dist
          7z a ../glintindex-windows-x64-${{ env.VERSION }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: glintindex-windows-x64-${{ env.VERSION }}.zip

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            homebrew_prefix: /opt/homebrew
            artifact_name: macos
          - arch: x86_64
            target: x86_64-apple-darwin
            homebrew_prefix: /usr/local
            artifact_name: macos-x86-64
    steps:
      - uses: actions/checkout@v7

      - name: Set Version
        shell: bash
        run: echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      # ARM64 GTK4 Installation
      - name: Install GTK4 (arm64)
        if: matrix.arch == 'arm64'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install gtk4 pkg-config

      # Cleaned up and working Rosetta / x86_64 GTK4 Installation
      - name: Install GTK4 (x86_64 via Rosetta)
        if: matrix.arch == 'x86_64'
        run: |
          /usr/sbin/softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" < /dev/null
          arch -x86_64 /usr/local/bin/brew install gtk4 pkg-config
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig" >> $GITHUB_ENV

      - name: Build release binary
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
        run: |
          cargo build --release --target ${{ matrix.target }} -p ${{ env.CLI_PKG }}
          cargo build --release --target ${{ matrix.target }} -p ${{ env.GUI_PKG }}

      - name: Create .app bundle
        run: |
          APP="${{ env.MAC_APP_NAME }}.app"
          CLI_PATH="target/${{ matrix.target }}/release/${{ env.CLI_BIN }}"
          GUI_PATH="target/${{ matrix.target }}/release/${{ env.GUI_BIN }}"
          PREFIX="${{ matrix.homebrew_prefix }}"

          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Frameworks"
          mkdir -p "${APP}/Contents/Resources/share"
          mkdir -p "${APP}/Contents/Resources/lib"
          mkdir -p "${APP}/Contents/Resources/etc"

          cp "${GUI_PATH}" "${APP}/Contents/MacOS/${{ env.GUI_BIN }}"
          chmod +x "${APP}/Contents/MacOS/${{ env.GUI_BIN }}"

          VISITED_FILE=$(mktemp)

          collect() {
            local lib="$1"
            local output_dir="$2"
            local name
            name=$(basename "$lib")

            case "$lib" in
              /usr/lib/*|/System/*|@rpath/*|@executable_path/*|@loader_path/*) return ;;
            esac

            if grep -Fxq "$lib" "$VISITED_FILE" 2>/dev/null; then
              return
            fi
            echo "$lib" >> "$VISITED_FILE"

            if [ -f "$lib" ]; then
              cp -f "$lib" "${output_dir}/${name}"
              chmod +w "${output_dir}/${name}"
              install_name_tool -id "@rpath/${name}" "${output_dir}/${name}"

              while read -r dep; do
                [ -n "$dep" ] && collect "$dep" "${output_dir}"
              done < <(otool -L "$lib" | tail -n +2 | awk '{print $1}')
            fi
          }

          echo "Collecting dylibs..."
          while read -r dep; do
            [ -n "$dep" ] && collect "$dep" "${APP}/Contents/Frameworks"
          done < <(otool -L "${GUI_PATH}" | tail -n +2 | awk '{print $1}')

          rm -f "$VISITED_FILE"

          echo "Rewriting dylib paths..."
          install_name_tool -add_rpath "@executable_path/../Frameworks" \
            "${APP}/Contents/MacOS/${{ env.GUI_BIN }}" 2>/dev/null || true

          find_prefix_refs() {
            local binary="$1"
            local prefix="$2"
            otool -L "$binary" | grep "${prefix}/" | awk '{print $1}'
          }

          for ref in $(find_prefix_refs "${GUI_PATH}" "${PREFIX}"); do
            name=$(basename "$ref")
            install_name_tool -change "$ref" "@rpath/${name}" \
              "${APP}/Contents/MacOS/${{ env.GUI_BIN }}"
          done

          for dylib in "${APP}/Contents/Frameworks/"*.dylib; do
            [ -f "$dylib" ] || continue
            for ref in $(find_prefix_refs "$dylib" "${PREFIX}"); do
              name=$(basename "$ref")
              install_name_tool -change "$ref" "@rpath/${name}" "$dylib"
            done
          done

          echo "Bundling GTK resources..."
          [ -d "${PREFIX}/share/gtk-4.0" ] && cp -R "${PREFIX}/share/gtk-4.0" "${APP}/Contents/Resources/share/"
          [ -d "${PREFIX}/share/icons" ] && cp -R "${PREFIX}/share/icons" "${APP}/Contents/Resources/share/"
          [ -d "${PREFIX}/share/glib-2.0" ] && cp -R "${PREFIX}/share/glib-2.0" "${APP}/Contents/Resources/share/"
          [ -d "${PREFIX}/share/pango" ] && cp -R "${PREFIX}/share/pango" "${APP}/Contents/Resources/share/"
          [ -d "${PREFIX}/lib/gdk-pixbuf-2.0" ] && cp -R "${PREFIX}/lib/gdk-pixbuf-2.0" "${APP}/Contents/Resources/lib/"
          [ -d "${PREFIX}/lib/gtk-4.0" ] && cp -R "${PREFIX}/lib/gtk-4.0" "${APP}/Contents/Resources/lib/"
          [ -d "${PREFIX}/lib/pango" ] && cp -R "${PREFIX}/lib/pango" "${APP}/Contents/Resources/lib/"
          [ -d "${PREFIX}/etc/fonts" ] && cp -R "${PREFIX}/etc/fonts" "${APP}/Contents/Resources/etc/"

          LOADERS_CACHE="${APP}/Contents/Resources/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"
          if [ -f "${LOADERS_CACHE}" ]; then
            sed -i '' "s|${PREFIX}/|/usr/|g" "${LOADERS_CACHE}"
          fi

          cat > "${APP}/Contents/MacOS/launcher" << LAUNCHER_EOF
          #!/bin/bash
          SCRIPT_DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          APP_DIR="\$(dirname "\$SCRIPT_DIR")"
          RESOURCES="\${APP_DIR}/Resources"

          export GTK_DATA_PREFIX="\${RESOURCES}"
          export GTK_EXE_PREFIX="\${APP_DIR}/Contents"
          export XDG_DATA_DIRS="\${RESOURCES}/share:\${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
          export GDK_PIXBUF_MODULE_FILE="\${RESOURCES}/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"
          export GTK_PATH="\${RESOURCES}/lib/gtk-4.0/4.0.0"
          export FONTCONFIG_PATH="\${RESOURCES}/etc/fonts"

          exec "\${SCRIPT_DIR}/${{ env.GUI_BIN }}" "\$@"
          LAUNCHER_EOF
          chmod +x "${APP}/Contents/MacOS/launcher"

          cat > "${APP}/Contents/Info.plist" << PLIST_EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${{ env.MAC_APP_NAME }}</string>
            <key>CFBundleDisplayName</key>
            <string>${{ env.MAC_APP_NAME }}</string>
            <key>CFBundleIdentifier</key>
            <string>com.riccione.glintindex</string>
            <key>CFBundleVersion</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleExecutable</key>
            <string>launcher</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST_EOF

          # Package Directory Layout (Place standalone CLI next to GUI App Bundle)
          mkdir -p staging_dir
          cp -R "${APP}" staging_dir/
          cp "${CLI_PATH}" staging_dir/${{ env.CLI_BIN }}

          ditto -c -k --sequesterRsrc --keepParent staging_dir \
            "glintindex-${{ matrix.artifact_name }}-${{ env.VERSION }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-zip
          path: glintindex-${{ matrix.artifact_name }}-${{ env.VERSION }}.zip

  build-source:
    name: Build Source Archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set Version
        shell: bash
        run: echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

      - name: Create source archive
        run: |
          git archive --format=tar.gz --prefix="glintindex-${{ env.VERSION }}/" \
            -o "glintindex-source-${{ env.VERSION }}.tar.gz" HEAD

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-tarball
          path: glintindex-source-${{ env.VERSION }}.tar.gz

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos, build-source]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: |
            artifacts/*.deb
            artifacts/glintindex-windows-x64-*.zip
            artifacts/glintindex-macos-*.zip
            artifacts/glintindex-source-*.tar.gz
